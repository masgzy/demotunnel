name: Build and Obfuscate edgetunnel

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */3 * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: 安装依赖项
        run: |
          npm install -g javascript-obfuscator

      - name: 下载 edgetunnel worker.js
        run: |
          wget -O origin.js https://github.com/cmliu/edgetunnel/raw/main/_worker.js

      - name: 压缩 worker.js
        run: |
          # 使用 esbuild 极限压缩，但保留 ES 模块语法，以便后续混淆器识别导出
          npx esbuild origin.js --bundle --minify --outfile=temp.js --target=esnext --format=esm

      - name: 混淆 edgetunnel worker.js
        run: |
          # 关键修改：使用 --reserved-names 保护全局和入口标识符
          javascript-obfuscator temp.js --output _worker.js \
              --compact true \
              --control-flow-flattening false \
              --dead-code-injection false \
              --self-defending false \
              --identifier-names-generator hexadecimal \
              --rename-globals false \
              --string-array true \
              --string-array-encoding 'rc4' \
              --string-array-threshold 1.0 \
              --transform-object-keys true \
              --split-strings true \
              --split-strings-chunk-length 5 \
              --unicode-escape-sequence false \
              --target browser \
              --reserved-names 'addEventListener,export,default,fetch'
          rm temp.js

      - name: 验证并修复入口函数
        run: |
          # 检查混淆后的文件是否包含有效的入口函数
          if ! grep -q "addEventListener('fetch'" _worker.js && ! grep -q "export default" _worker.js; then
            echo "❌ 错误：混淆后的文件缺少 Workers 入口函数！"
            # 尝试自动修复：将原始入口点附加到混淆文件末尾
            echo "// 原始入口点" >> _worker.js
            echo "addEventListener('fetch', event => { event.respondWith(handleRequest(event.request)); });" >> _worker.js
            echo "⚠️ 已自动添加基础入口函数，请手动检查并完善。"
          else
            echo "✅ 混淆后的文件包含有效的入口函数。"
          fi

      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: main
          commit_message: ':arrow_up: 更新最新的 edgetunnel'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          push_options: '--set-upstream'
